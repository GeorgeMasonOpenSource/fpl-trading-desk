# YouTube creator-signal ingest, run on a 6-hourly cron from GitHub Actions.
#
# Why GitHub Actions and not Vercel:
#   YouTube rate-limits Vercel / AWS IP ranges aggressively. Actions runs from
#   Azure-hosted runners which YouTube treats normally — we've seen 100% of
#   captions returned vs ~10% on Vercel cron.
#
# Wiring:
#   1. Repo Settings → Secrets and variables → Actions
#        - DATABASE_URL          (pooled Neon URL — pgbouncer-safe)
#        - DIRECT_DATABASE_URL   (direct Neon URL — used by scripts only)
#   2. Workflow has no other inputs; the channel list is committed at
#      data/youtube-channels.json.
#   3. Logs are kept by Actions for 90 days; see the job summary for per-video
#      counts of signals / numeric claims / rankings inserted.
#
# Safe to re-run: the DB INSERTs are all ON CONFLICT DO NOTHING (signals,
# numeric_claims, rankings) so multiple runs in the same window are idempotent.

name: ingest-youtube

on:
  schedule:
    # Every 2 hours at :17 so we miss the on-the-hour spike of cron traffic.
    # Was 6h — bumped to 2h so new creator videos land on the Creator
    # Board within ~2h of upload (most creators post once a week, but the
    # 24-48h pre-deadline window has a flurry of content we want to catch
    # quickly).
    - cron: '17 */2 * * *'
  # Manual trigger from the Actions tab for one-off catch-up runs.
  workflow_dispatch: {}

# Don't pile up if a previous run is still going — newer wins.
concurrency:
  group: ingest-youtube
  cancel-in-progress: false

jobs:
  ingest:
    name: Pull videos + extract signals
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node deps
        run: npm ci

      # yt-dlp is the most reliable caption fetcher in 2026 — YouTube's
      # anti-bot has tightened to the point that the plain HTTP / Innertube
      # strategies in transcript.ts now return HTTP 400 for unauthenticated
      # requests. yt-dlp's maintainers patch around these changes weekly.
      - name: Set up Python (for yt-dlp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade yt-dlp
          yt-dlp --version

      - name: Run YouTube ingest
        env:
          # These map to the same env vars our scripts read locally. The
          # DIRECT_DATABASE_URL is used by tsx scripts to avoid pgbouncer's
          # session-mode limitations on prepared statements.
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
        run: npm run ingest:youtube

      # Mini-league ingest piggy-backs on the same cron — rival picks
      # only change at most twice a week (deadlines), but a 2h refresh
      # keeps the Mini-League War Room broadly current. Requires the
      # FPL_MANAGER_ID secret so it knows whose leagues to pull.
      - name: Run mini-league ingest
        if: ${{ env.FPL_MANAGER_ID != '' }}
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          FPL_MANAGER_ID:      ${{ secrets.FPL_MANAGER_ID }}
        run: npm run ingest:league

      - name: Summarise to job summary
        if: always()
        run: |
          {
            echo "### YouTube ingest"
            echo ""
            echo "- Triggered: ${{ github.event_name }}"
            echo "- Runner: ${{ runner.os }} (${{ runner.arch }})"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
